<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TCS NQT 2026 – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a56db;--accent:#00c2ff;--white:#fff;--grey:#8a99b3;--surface:#111d35;--border:#1e3256;--green:#10b981;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(26,86,219,.3) 0%,transparent 70%);pointer-events:none}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(26,86,219,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,86,219,.05) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:float 8s ease-in-out infinite}
.orb1{width:350px;height:350px;background:rgba(26,86,219,.15);top:-80px;right:-80px}
.orb2{width:280px;height:280px;background:rgba(0,194,255,.08);bottom:-40px;left:-60px;animation-delay:3s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.wrap{position:relative;width:100%;max-width:440px;padding:16px}
.brand{text-align:center;margin-bottom:28px}
.brand-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px}
.brand-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 8px 24px rgba(26,86,219,.4)}
.brand-name{font-size:26px;font-weight:800;color:var(--white)}
.brand-sub{font-size:12px;color:var(--grey);letter-spacing:.8px;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.card h2{font-size:20px;font-weight:700;color:var(--white);margin-bottom:5px}
.card p{font-size:13px;color:var(--grey);margin-bottom:24px}
.form-group{margin-bottom:18px}
label{display:block;font-size:11px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
input{width:100%;padding:12px 14px;background:var(--navy);border:1.5px solid var(--border);border-radius:9px;color:var(--white);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.18)}
input::placeholder{color:rgba(138,153,179,.45)}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--accent));border:none;border-radius:9px;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 20px rgba(26,86,219,.4);margin-top:6px;transition:transform .15s}
.btn-login:hover{transform:translateY(-2px)}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 13px;font-size:12px;color:#f87171;margin-bottom:18px}
.demo-creds{margin-top:20px;padding:14px;background:rgba(26,86,219,.08);border:1px solid rgba(26,86,219,.18);border-radius:9px}
.demo-creds h4{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.demo-creds p{font-size:11px;color:var(--grey);line-height:1.9}
.demo-creds span{color:var(--white);font-weight:600}
.footer-note{text-align:center;margin-top:20px;font-size:11px;color:var(--grey)}
.footer-note a{color:var(--accent)}
</style></head><body>
<div class="grid-bg"></div><div class="orb orb1"></div><div class="orb orb2"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">T</div>
      <div class="brand-name">TCS NQT 2026</div>
    </div>
    <div class="brand-sub">National Qualifier Test · Online Assessment</div>
  </div>
  <div class="card">
    <h2>Candidate Login</h2>
    <p>Enter your registered credentials to begin the assessment.</p>
    {% if error %}<div class="error-msg">⚠ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="your.email@example.com" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter your password" required></div>
      <button type="submit" class="btn-login">Login &amp; Proceed →</button>
    </form>
  </div>
  <div class="footer-note">© 2026 TCS NQT Online Assessment · Made By <a href="#">KRUSHNA YEOLE</a></div>
</div>
</body></html>
