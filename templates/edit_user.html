<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Edit User – TCS NQT Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a56db;--accent:#00c2ff;--white:#fff;--grey:#8a99b3;--surface:#111d35;--border:#1e3256;--green:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--navy);min-height:100vh;color:var(--white)}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.wrap{max-width:600px;margin:28px auto;padding:0 16px 60px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px}
h1{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:12px;color:var(--grey);margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.6px}
input{padding:10px 12px;background:var(--navy);border:1.5px solid var(--border);border-radius:8px;color:var(--white);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--blue)}
input::placeholder{color:rgba(138,153,179,.4)}
.sec-div{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.7px;margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);grid-column:1/-1}
.btn-save{padding:11px 28px;background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:9px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px}
footer{text-align:center;margin-top:24px;font-size:11px;color:var(--grey)}
footer span{color:var(--accent);font-weight:600}
</style></head><body>
<header>
  <div style="display:flex;align-items:center;gap:10px"><div class="hdr-icon">T</div><strong style="font-size:14px">Edit User</strong></div>
  <a href="/admin" style="font-size:12px;color:var(--grey);text-decoration:none">← Dashboard</a>
</header>
<div class="wrap">
  <div class="card">
    <h1>Edit Candidate</h1>
    <div class="sub">Update details for {{ user.name }}</div>
    <form method="POST">
      <div class="form-grid">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" value="{{ user.name }}" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ user.email }}" required></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="+91 XXXXXXXXXX"></div>
        <div class="form-group"><label>College / Institution</label><input type="text" name="college" value="{{ user.college or '' }}" placeholder="College name"></div>
        <div class="form-group"><label>Roll Number</label><input type="text" name="roll_no" value="{{ user.roll_no or '' }}" placeholder="Roll No / ID"></div>
        <div class="form-group full sec-div">Security</div>
        <div class="form-group full"><label>New Password (leave blank to keep current)</label><input type="text" name="new_password" placeholder="Enter new password or leave blank"></div>
      </div>
      <button type="submit" class="btn-save">Save Changes →</button>
    </form>
  </div>
  <footer>© 2026 TCS NQT Online Assessment Platform &nbsp;·&nbsp; Made By <span>KRUSHNA YEOLE</span> &nbsp;·&nbsp; All Rights Reserved</footer>
</div>
</body></html>
