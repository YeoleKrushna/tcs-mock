<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Question – TCS NQT Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1a56db;--accent:#00c2ff;--white:#fff;--grey:#8a99b3;--surface:#111d35;--border:#1e3256;--green:#10b981;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--navy);min-height:100vh;color:var(--white)}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.wrap{max-width:700px;margin:32px auto;padding:0 16px 60px}
h1{font-size:20px;font-weight:800;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:540px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:.6px}
input,select,textarea{padding:10px 12px;background:var(--navy);border:1.5px solid var(--border);border-radius:8px;color:var(--white);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:rgba(138,153,179,.4)}
textarea{resize:vertical;min-height:70px}
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:9px;background:var(--navy);border:1.5px solid var(--border);border-radius:7px;color:var(--grey);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.type-btn.active{border-color:var(--blue);color:var(--accent);background:rgba(26,86,219,.1)}
.section-divider{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.7px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn-submit{padding:11px 28px;background:linear-gradient(135deg,var(--green),#059669);border:none;border-radius:9px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px;transition:transform .15s}
.btn-submit:hover{transform:translateY(-1px)}
.position-hint{font-size:10px;color:var(--grey);margin-top:3px}
footer{text-align:center;margin-top:28px;font-size:11px;color:var(--grey)}
footer span{color:var(--accent);font-weight:600}
</style></head><body>
<header>
  <div class="hdr-brand"><div class="hdr-icon">T</div><strong style="font-size:14px">Add Question</strong></div>
  <a href="/admin" style="font-size:12px;color:var(--grey);text-decoration:none">← Dashboard</a>
</header>
<div class="wrap">
  <div class="card">
    <form method="POST" enctype="multipart/form-data">
      <div class="section-divider">Question Details</div>
      <div class="form-row">
        <div class="form-group">
          <label>Section</label>
          <select name="section" required>
            {% for s in sections %}<option value="{{ s.id }}" {% if s.id==prefill_section %}selected{% endif %}>{{ s.name }} ({{ section_counts[s.id] }} Qs)</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Insert at Position</label>
          <input type="number" name="position" placeholder="Leave blank = last" min="1">
          <div class="position-hint">Existing questions will shift down if position is occupied.</div>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div class="section-divider">Question Type</div>
        <input type="hidden" name="question_type" id="qTypeInput" value="mcq">
        <div class="type-toggle">
          <button type="button" class="type-btn active" onclick="setType('mcq',this)">MCQ (Multiple Choice)</button>
          <button type="button" class="type-btn" onclick="setType('fill',this)">Fill in the Blank</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Question Text</label>
          <textarea name="question_text" placeholder="Type the question text here..." rows="3"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Question Image (optional)</label>
          <input type="file" name="question_image" accept="image/*">
        </div>
        <div class="form-group">
          <label>Marks</label>
          <input type="number" name="marks" value="1" min="1" max="5">
        </div>
      </div>
      <div id="mcqSection">
        <div class="section-divider">Answer Options</div>
        <div class="form-row">
          <div class="form-group"><label>Option A</label><input type="text" name="option_a" placeholder="Option A text"></div>
          <div class="form-group"><label>Option B</label><input type="text" name="option_b" placeholder="Option B text"></div>
          <div class="form-group"><label>Option C</label><input type="text" name="option_c" placeholder="Option C text"></div>
          <div class="form-group"><label>Option D</label><input type="text" name="option_d" placeholder="Option D text"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Correct Answer</label>
            <select name="correct_answer">
              <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
            </select>
          </div>
        </div>
      </div>
      <div id="fillSection" style="display:none">
        <div class="section-divider">Correct Answer</div>
        <div class="form-group">
          <label>Exact Answer Text</label>
          <input type="text" name="correct_answer_fill" placeholder="Type the exact correct answer">
        </div>
      </div>
      <button type="submit" class="btn-submit">Save Question →</button>
    </form>
  </div>
  <footer>© 2026 TCS NQT Online Assessment Platform &nbsp;·&nbsp; Made By <span>KRUSHNA YEOLE</span> &nbsp;·&nbsp; All Rights Reserved</footer>
</div>
<script>
function setType(type,btn){
  document.getElementById('qTypeInput').value=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mcqSection').style.display=type==='mcq'?'block':'none';
  document.getElementById('fillSection').style.display=type==='fill'?'block':'none';
}
</script>
</body></html>
